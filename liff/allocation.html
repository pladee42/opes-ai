<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าแผนลงทุน - Family Wealth AI</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* ===== DESIGN TOKENS ===== */
        :root {
            /* Backgrounds */
            --bg: #0B0B0C;
            --bg-gradient: radial-gradient(ellipse at top, #121214 0%, #0B0B0C 50%, #050505 100%);
            
            /* Surfaces */
            --surface: #141416;
            --surface-2: #1A1A1D;
            --surface-3: #222226;
            
            /* Text */
            --text: #FFFFFF;
            --text-secondary: #E5E5E7;
            --muted: #8E8E93;
            
            /* Gold Accent */
            --gold: #D4AF37;
            --gold-2: #C5A028;
            --gold-muted: rgba(212, 175, 55, 0.15);
            --gold-glow: 0 0 20px rgba(212, 175, 55, 0.2);
            
            /* Semantic */
            --success: #30D158;
            --danger: #FF453A;
            --divider: rgba(255, 255, 255, 0.08);
            
            /* Focus */
            --focus-ring: 0 0 0 2px var(--gold);
            
            /* Typography */
            --font-xs: 0.75rem;
            --font-sm: 0.875rem;
            --font-base: 1rem;
            --font-lg: 1.125rem;
            --font-xl: 1.25rem;
            --font-2xl: 1.5rem;
            
            /* Spacing */
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
            
            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }
        
        /* ===== BASE STYLES ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--divider);
            padding: var(--space-5) var(--space-4);
            text-align: center;
        }
        
        .header h1 {
            font-size: var(--font-xl);
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        
        .header p {
            font-size: var(--font-sm);
            color: var(--muted);
            margin-top: var(--space-1);
        }
        
        /* ===== CONTAINER ===== */
        .container {
            padding: var(--space-4);
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* ===== BUDGET SECTION ===== */
        .budget-section {
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }
        
        .budget-label {
            display: block;
            font-size: var(--font-sm);
            color: var(--muted);
            margin-bottom: var(--space-2);
        }
        
        .budget-input-wrapper {
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .budget-input-wrapper .currency {
            font-size: var(--font-2xl);
            font-weight: 600;
            color: var(--gold);
        }
        
        .budget-input-wrapper input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--divider);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            font-size: var(--font-xl);
            font-weight: 600;
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .budget-input-wrapper input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: var(--focus-ring);
        }
        
        .budget-input-wrapper input::placeholder {
            color: var(--muted);
        }
        
        /* ===== TOTAL BAR ===== */
        .total-bar {
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .total-bar .label {
            font-size: var(--font-sm);
            color: var(--muted);
        }
        
        .total-bar .value {
            font-size: var(--font-2xl);
            font-weight: 700;
            color: var(--text);
            transition: color 0.2s;
        }
        
        .total-bar .value.valid {
            color: var(--success);
        }
        
        .total-bar .value.invalid {
            color: var(--danger);
        }
        
        /* ===== ALLOCATION LIST ===== */
        .allocation-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }
        
        .allocation-item {
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            display: flex;
            align-items: center;
            gap: var(--space-3);
            transition: border-color 0.2s;
        }
        
        .allocation-item:focus-within {
            border-color: rgba(212, 175, 55, 0.3);
        }
        
        .allocation-item input[type="text"] {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--divider);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            font-size: var(--font-base);
            font-weight: 500;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            min-width: 0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .allocation-item input[type="text"]:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: var(--focus-ring);
        }
        
        .allocation-item input[type="text"]::placeholder {
            color: var(--muted);
            text-transform: uppercase;
        }
        
        .allocation-item input[type="number"] {
            width: 72px;
            background: var(--surface-2);
            border: 1px solid var(--divider);
            border-radius: var(--radius-sm);
            padding: var(--space-3);
            font-size: var(--font-base);
            font-weight: 500;
            color: var(--text);
            text-align: center;
            transition: border-color 0.2s, box-shadow 0.2s;
            -moz-appearance: textfield;
            appearance: textfield;
        }
        
        .allocation-item input[type="number"]::-webkit-outer-spin-button,
        .allocation-item input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .allocation-item input[type="number"]:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: var(--focus-ring);
        }
        
        .allocation-item input[type="number"]::placeholder {
            color: var(--muted);
        }
        
        .allocation-item .percent {
            color: var(--muted);
            font-weight: 500;
            font-size: var(--font-sm);
        }
        
        .allocation-item .remove-btn {
            background: transparent;
            color: var(--danger);
            border: 1px solid rgba(255, 69, 58, 0.3);
            border-radius: var(--radius-sm);
            width: 40px;
            height: 40px;
            font-size: var(--font-xl);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }
        
        .allocation-item .remove-btn:hover {
            background: rgba(255, 69, 58, 0.1);
            border-color: var(--danger);
        }
        
        .allocation-item .remove-btn:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--danger);
        }
        
        /* ===== ADD BUTTON ===== */
        .add-btn {
            width: 100%;
            background: transparent;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            font-size: var(--font-base);
            color: var(--gold);
            cursor: pointer;
            margin-top: var(--space-3);
            transition: background 0.2s, border-color 0.2s;
        }
        
        .add-btn:hover {
            background: var(--gold-muted);
            border-color: var(--gold);
        }
        
        .add-btn:focus {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        
        /* ===== ACTION BUTTONS ===== */
        .action-buttons {
            display: flex;
            gap: var(--space-3);
            margin-top: var(--space-3);
        }
        
        .action-buttons .add-btn,
        .action-buttons .distribute-btn {
            flex: 1;
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-base);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            font-weight: 500;
            box-sizing: border-box;
        }
        
        .action-buttons .add-btn {
            background: transparent;
            border: 1px dashed rgba(212, 175, 55, 0.4);
            color: var(--gold);
            width: auto;
            margin-top: 0;
        }
        
        .action-buttons .add-btn:hover {
            background: var(--gold-muted);
            border-color: var(--gold);
        }
        
        .action-buttons .distribute-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--divider);
            color: var(--text-secondary);
        }
        
        .action-buttons .distribute-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--muted);
        }
        
        .action-buttons .distribute-btn:active,
        .action-buttons .add-btn:active {
            transform: scale(0.98);
        }
        
        .action-buttons .distribute-btn:focus,
        .action-buttons .add-btn:focus {
            outline: none;
            box-shadow: var(--focus-ring);
        }
        
        /* ===== FOOTER ===== */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--divider);
            padding: var(--space-4);
        }
        
        /* ===== SAVE BUTTON ===== */
        .save-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-2) 100%);
            color: #0B0B0C;
            border: none;
            border-radius: var(--radius-md);
            padding: var(--space-4);
            font-size: var(--font-base);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: var(--gold-glow);
        }
        
        .save-btn:disabled {
            background: var(--surface-3);
            color: var(--muted);
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .save-btn:not(:disabled):hover {
            opacity: 0.9;
        }
        
        .save-btn:not(:disabled):active {
            transform: scale(0.98);
        }
        
        .save-btn:focus {
            outline: none;
            box-shadow: var(--gold-glow), var(--focus-ring);
        }
        
        /* ===== LOADING STATE ===== */
        .loading {
            text-align: center;
            padding: var(--space-10);
            color: var(--muted);
            font-size: var(--font-base);
        }
        
        /* ===== ERROR STATE ===== */
        .error {
            background: rgba(255, 69, 58, 0.1);
            border: 1px solid rgba(255, 69, 58, 0.3);
            color: var(--danger);
            padding: var(--space-3);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-4);
            font-size: var(--font-sm);
        }

        /* ===== SWITCH STYLE ===== */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface-3);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--divider);
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--muted);
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--gold-muted);
            border-color: var(--gold);
        }
        
        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: var(--gold);
        }

        /* ===== CHECKBOX LIST STYLE ===== */
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--surface-2);
            border: 1px solid var(--divider);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: var(--font-sm);
            transition: background-color 0.2s, border-color 0.2s;
        }
        
        .checkbox-item:hover {
            background: var(--surface-3);
            border-color: rgba(212, 175, 55, 0.3);
        }
        
        .checkbox-item input[type="checkbox"] {
            accent-color: var(--gold);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ ตั้งค่าแผนลงทุน</h1>
        <p>ตั้งค่างบและสัดส่วนการลงทุน</p>
    </div>
    
    <div class="container">
        <div id="loading" class="loading">กำลังโหลด...</div>
        <div id="content" style="display: none;">
            <!-- Budget Section -->
            <div class="budget-section">
                <label class="budget-label">💰 งบลงทุนต่อเดือน</label>
                <div class="budget-input-wrapper">
                    <span class="currency">฿</span>
                    <input type="text" id="budgetInput" placeholder="10,000" inputmode="numeric" oninput="formatBudgetInput(this)">
                </div>
            </div>
            
            <div class="total-bar">
                <span class="label">รวมทั้งหมด</span>
                <span class="value" id="totalPercent">0%</span>
            </div>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <div class="allocation-list" id="allocationList"></div>
            
            <div class="action-buttons">
                <button class="add-btn" onclick="addItem()">+ เพิ่ม Ticker</button>
                <button class="distribute-btn" id="distributeBtn" onclick="distributeEqual()">⚖️ แบ่งสัดส่วนเท่ากัน</button>
            </div>

            <!-- Technical Digest Section -->
            <div class="digest-section" style="background: var(--surface); border: 1px solid var(--divider); border-radius: var(--radius-lg); padding: var(--space-4); margin-top: var(--space-6);">
                <h2 style="font-size: var(--font-base); font-weight: 600; color: var(--gold); border-bottom: 1px solid var(--divider); padding-bottom: var(--space-2); margin-bottom: var(--space-4);">📡 Technical Digest</h2>
                
                <div class="digest-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                    <span style="font-size: var(--font-sm); color: var(--text-secondary);">เปิดรับรายงานวิเคราะห์เทคนิค</span>
                    <label class="switch">
                        <input type="checkbox" id="digestEnabled" onchange="toggleDigestFields()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div id="digestFields" style="display: none;">
                    <div style="margin-bottom: var(--space-4);">
                        <label style="display: block; font-size: var(--font-sm); color: var(--muted); margin-bottom: var(--space-2);">📊 สินทรัพย์ที่ต้องการติดตาม</label>
                        <div id="digestAssetsContainer" style="display: flex; flex-direction: column; gap: var(--space-2);">
                            <!-- Populated dynamically -->
                        </div>
                    </div>
                    
                    <div style="margin-bottom: var(--space-4);">
                        <label style="display: block; font-size: var(--font-sm); color: var(--muted); margin-bottom: var(--space-2);">⏰ ความถี่การส่งรายงาน</label>
                        <div style="display: flex; gap: var(--space-4);">
                            <label style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-sm); cursor: pointer;">
                                <input type="radio" name="frequency" value="daily" checked onchange="updateFrequencyFields()" style="accent-color: var(--gold);"> ทุกวัน
                            </label>
                            <label style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-sm); cursor: pointer;">
                                <input type="radio" name="frequency" value="weekly" onchange="updateFrequencyFields()" style="accent-color: var(--gold);"> ทุกสัปดาห์
                            </label>
                            <label style="display: flex; align-items: center; gap: var(--space-2); font-size: var(--font-sm); cursor: pointer;">
                                <input type="radio" name="frequency" value="monthly" onchange="updateFrequencyFields()" style="accent-color: var(--gold);"> ทุกเดือน
                            </label>
                        </div>
                    </div>
                    
                    <div id="weeklyDayField" style="display: none; margin-bottom: var(--space-4);">
                        <label style="display: block; font-size: var(--font-sm); color: var(--muted); margin-bottom: var(--space-2);">📅 วันที่ส่งรายงาน (รายสัปดาห์)</label>
                        <select id="digestDay" style="width: 100%; background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--radius-sm); padding: var(--space-3); font-size: var(--font-sm); color: var(--text); outline: none; cursor: pointer;">
                            <option value="monday">วันจันทร์ (Monday)</option>
                            <option value="tuesday">วันอังคาร (Tuesday)</option>
                            <option value="wednesday">วันพุธ (Wednesday)</option>
                            <option value="thursday">วันพฤหัสบดี (Thursday)</option>
                            <option value="friday">วันศุกร์ (Friday)</option>
                            <option value="saturday">วันเสาร์ (Saturday)</option>
                            <option value="sunday">วันอาทิตย์ (Sunday)</option>
                        </select>
                    </div>
                    
                    <div style="margin-bottom: var(--space-4);">
                        <label style="display: block; font-size: var(--font-sm); color: var(--muted); margin-bottom: var(--space-2);">🕐 เวลาที่ส่งรายงาน (ICT)</label>
                        <select id="digestTime" style="width: 100%; background: var(--surface-2); border: 1px solid var(--divider); border-radius: var(--radius-sm); padding: var(--space-3); font-size: var(--font-sm); color: var(--text); outline: none; cursor: pointer;">
                            <option value="06">06:00</option>
                            <option value="07" selected>07:00</option>
                            <option value="08">08:00</option>
                            <option value="09">09:00</option>
                            <option value="10">10:00</option>
                            <option value="11">11:00</option>
                            <option value="12">12:00</option>
                            <option value="13">13:00</option>
                            <option value="14">14:00</option>
                            <option value="15">15:00</option>
                            <option value="16">16:00</option>
                            <option value="17">17:00</option>
                            <option value="18">18:00</option>
                            <option value="19">19:00</option>
                            <option value="20">20:00</option>
                            <option value="21">21:00</option>
                            <option value="22">22:00</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <button class="save-btn" id="saveBtn" disabled onclick="saveAllocation()">
            บันทึกแผน
        </button>
    </div>
    
    <script>
        // LIFF ID - Replace with your actual LIFF ID
        const LIFF_ID = '2008769324-8sktNl4c';
        
        // API endpoint for saving allocation (Cloud Run)
        const API_ENDPOINT = 'https://opes-ai-9850054870.asia-southeast1.run.app/api/allocation';
        
        let userId = null;
        let allocations = [];
        let monthlyBudget = 10000;
        let loadedDigestAssets = [];
        
        function formatBudgetInput(input) {
            // Remove non-digits
            let value = input.value.replace(/[^\d]/g, '');
            // Format with commas
            if (value) {
                value = parseInt(value).toLocaleString('en-US');
            }
            input.value = value;
            // Update actual budget value (remove commas for calculation)
            monthlyBudget = parseInt(input.value.replace(/,/g, '')) || 10000;
        }
        
        function updateBudget() {
            const input = document.getElementById('budgetInput');
            monthlyBudget = parseInt(input.value.replace(/,/g, '')) || 10000;
        }
        
        // Initialize LIFF
        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                
                const profile = await liff.getProfile();
                userId = profile.userId;
                
                // Load existing user settings
                await loadUserSettings();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                console.error('LIFF init error:', error);
                showError('ไม่สามารถเชื่อมต่อ LINE ได้');
            }
        }
        
        async function loadUserSettings() {
            try {
                const response = await fetch(API_ENDPOINT.replace('/api/allocation', `/api/user/${userId}`));
                const data = await response.json();
                
                // Set budget
                if (data.monthly_budget) {
                    document.getElementById('budgetInput').value = data.monthly_budget.toLocaleString('en-US');
                    monthlyBudget = data.monthly_budget;
                }
                
                // Set allocations
                if (data.target_allocation && Object.keys(data.target_allocation).length > 0) {
                    loadedDigestAssets = data.digest_assets || [];
                    // Load existing allocations
                    for (const [ticker, weight] of Object.entries(data.target_allocation)) {
                        const id = ++itemCounter;
                        allocations.push({ id, ticker, weight });
                    }
                    renderList();
                } else {
                    // New user - add empty items
                    addItem();
                    addItem();
                    addItem();
                }

                // Set digest fields
                if (data.digest_enabled !== undefined) {
                    document.getElementById('digestEnabled').checked = data.digest_enabled;
                }
                if (data.digest_frequency) {
                    const freqInput = document.querySelector(`input[name="frequency"][value="${data.digest_frequency}"]`);
                    if (freqInput) freqInput.checked = true;
                }
                if (data.digest_time) {
                    document.getElementById('digestTime').value = data.digest_time;
                }
                if (data.digest_day) {
                    document.getElementById('digestDay').value = data.digest_day;
                }
                
                updateDigestAssetsList(loadedDigestAssets);
                toggleDigestFields();
                updateFrequencyFields();
                
            } catch (error) {
                console.error('Failed to load settings:', error);
                // Add empty items on error
                addItem();
                addItem();
                addItem();
            }
        }
        
        let itemCounter = 0;  // Counter for unique IDs
        
        function addItem() {
            const id = ++itemCounter;  // Guaranteed unique
            allocations.push({ id, ticker: '', weight: 0 });
            renderList();
        }
        
        function removeItem(id) {
            allocations = allocations.filter(a => a.id !== id);
            renderList();
            updateTotal();
        }
        
        function updateItem(id, field, value) {
            const item = allocations.find(a => a.id === id);
            if (item) {
                item[field] = field === 'weight' ? parseFloat(value) || 0 : value.toUpperCase();
            }
            updateTotal();
        }
        
        function renderList() {
            const list = document.getElementById('allocationList');
            list.innerHTML = allocations.map(item => `
                <div class="allocation-item">
                    <input type="text" 
                           placeholder="TICKER" 
                           value="${item.ticker}"
                           maxlength="10"
                           oninput="updateItem(${item.id}, 'ticker', this.value)">
                    <input type="number" 
                           placeholder="0" 
                           value="${item.weight || ''}"
                           min="0" 
                           max="100"
                           oninput="updateItem(${item.id}, 'weight', this.value)">
                    <span class="percent">%</span>
                    <button class="remove-btn" onclick="removeItem(${item.id})">×</button>
                </div>
            `).join('');
            updateTotal();
            updateDigestAssetsList();
        }
        
        function updateTotal() {
            const sum = allocations.reduce((sum, a) => sum + (a.weight || 0), 0);
            const total = Math.round(sum * 100) / 100;
            const totalEl = document.getElementById('totalPercent');
            const saveBtn = document.getElementById('saveBtn');
            
            totalEl.textContent = `${total}%`;
            
            if (total === 100) {
                totalEl.className = 'value valid';
                saveBtn.disabled = false;
            } else {
                totalEl.className = 'value invalid';
                saveBtn.disabled = true;
            }
        }
        
        function distributeEqual() {
            const count = allocations.length;
            if (count === 0) return;
            
            const baseWeight = Math.floor(10000 / count) / 100;
            const remainderCents = Math.round((100 - (baseWeight * count)) * 100);
            
            allocations.forEach((item, index) => {
                const extra = index < remainderCents ? 0.01 : 0;
                item.weight = parseFloat((baseWeight + extra).toFixed(2));
            });
            
            renderList();
        }
        
        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        async function saveAllocation() {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'กำลังบันทึก...';
            
            // Filter valid allocations
            const validAllocations = allocations.filter(a => a.ticker && a.weight > 0);
            
            // Convert to object format
            const allocationMap = {};
            validAllocations.forEach(a => {
                allocationMap[a.ticker] = a.weight;
            });
            
            try {
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        allocation: allocationMap,
                        monthly_budget: monthlyBudget,
                        digest_enabled: document.getElementById('digestEnabled').checked,
                        digest_assets: getSelectedDigestAssets(),
                        digest_frequency: document.querySelector('input[name="frequency"]:checked').value,
                        digest_time: document.getElementById('digestTime').value,
                        digest_day: document.getElementById('digestDay').value,
                    }),
                });
                
                if (!response.ok) {
                    throw new Error('Failed to save');
                }
                
                // Success - close LIFF
                liff.closeWindow();
                
            } catch (error) {
                console.error('Save error:', error);
                showError('บันทึกไม่สำเร็จ กรุณาลองใหม่');
                saveBtn.disabled = false;
                saveBtn.textContent = 'บันทึกแผน';
            }
        }
        
        /* ===== TECHNICAL DIGEST HELPERS ===== */
        function toggleDigestFields() {
            const enabled = document.getElementById('digestEnabled').checked;
            document.getElementById('digestFields').style.display = enabled ? 'block' : 'none';
        }
        
        function updateFrequencyFields() {
            const freq = document.querySelector('input[name="frequency"]:checked').value;
            document.getElementById('weeklyDayField').style.display = freq === 'weekly' ? 'block' : 'none';
        }

        function updateDigestAssetsList(savedAssets = null) {
            const container = document.getElementById('digestAssetsContainer');
            if (!container) return;
            
            const tickers = [...new Set(allocations.map(a => a.ticker.trim().toUpperCase()).filter(t => t))];
            
            if (tickers.length === 0) {
                container.innerHTML = `<span style="color: var(--muted); font-size: var(--font-xs);">เพิ่ม Ticker ด้านบนเพื่อติดตาม</span>`;
                return;
            }
            
            let currentSelection = savedAssets;
            if (!currentSelection) {
                currentSelection = getSelectedDigestAssets();
                if (currentSelection.length === 0 && loadedDigestAssets.length > 0) {
                    currentSelection = loadedDigestAssets;
                }
            }
            
            // For new users with no selection and no loaded assets, default to check all
            const isFirstLoad = !savedAssets && getSelectedDigestAssets().length === 0 && loadedDigestAssets.length === 0;
            
            container.innerHTML = tickers.map(ticker => {
                const checked = isFirstLoad || (currentSelection && currentSelection.includes(ticker)) ? 'checked' : '';
                return `
                    <label class="checkbox-item">
                        <input type="checkbox" name="digestAsset" value="${ticker}" ${checked}>
                        <span>${ticker}</span>
                    </label>
                `;
            }).join('');
        }

        function getSelectedDigestAssets() {
            const checkedBoxes = document.querySelectorAll('input[name="digestAsset"]:checked');
            return Array.from(checkedBoxes).map(cb => cb.value);
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', initLiff);
    </script>
</body>
</html>
